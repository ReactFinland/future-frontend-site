<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (() => {
        const storageKey = "future-frontend-theme";
        const root = document.documentElement;
        const media = window.matchMedia("(prefers-color-scheme: dark)");

        const getStoredTheme = () => {
          try {
            const storedTheme = window.localStorage.getItem(storageKey);

            return storedTheme === "dark" || storedTheme === "light"
              ? storedTheme
              : null;
          } catch {
            return null;
          }
        };

        const getTheme = () =>
          getStoredTheme() || (media.matches ? "dark" : "light");

        const applyTheme = (theme) => {
          root.dataset.theme = theme;
          root.style.colorScheme = theme;
        };

        const syncToggleButtons = (theme) => {
          document.querySelectorAll("[data-theme-toggle]").forEach((button) => {
            const nextTheme = theme === "dark" ? "light" : "dark";

            button.setAttribute("aria-label", `Switch to ${nextTheme} mode`);
            button.setAttribute("aria-pressed", String(theme === "dark"));
            button.setAttribute("title", `Switch to ${nextTheme} mode`);

            const label = button.querySelector("[data-theme-label]");

            if (label) {
              label.textContent = `Switch to ${nextTheme} mode`;
            }
          });
        };

        const setTheme = (theme) => {
          applyTheme(theme);
          syncToggleButtons(theme);
        };

        applyTheme(getTheme());

        document.addEventListener("DOMContentLoaded", () => {
          setTheme(getTheme());

          document.querySelectorAll("[data-theme-toggle]").forEach((button) => {
            button.addEventListener("click", () => {
              const nextTheme = root.dataset.theme === "dark"
                ? "light"
                : "dark";

              try {
                window.localStorage.setItem(storageKey, nextTheme);
              } catch {
                // Ignore storage errors and keep the current page interactive.
              }

              setTheme(nextTheme);
            });
          });
        });

        const handleSystemThemeChange = (event) => {
          if (getStoredTheme()) {
            return;
          }

          setTheme(event.matches ? "dark" : "light");
        };

        if (typeof media.addEventListener === "function") {
          media.addEventListener("change", handleSystemThemeChange);
        } else if (typeof media.addListener === "function") {
          media.addListener(handleSystemThemeChange);
        }
      })();
    </script>
    <link rel="icon" href="/images/icon.ico" sizes="any" />
    <link rel="icon" href="/images/icon.svg" type="image/svg+xml" />
    <link
      rel="canonical"
      &href="(urlJoin (get context meta.url) (get context url))"
    />
    <link
      rel="preload"
      href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"
      integrity="sha384-o/2yZuJZWGJ4s/adjxVW71R+EO/LyCwdQfP5UWSgX/w87iiTXuvDZaejd3TsN7mf"
      crossorigin="anonymous"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <style>
      @view-transition {
        navigation: auto;
      }
    </style>
    <MetaFields />
    <style>
      :root {
        color-scheme: light;
        --color-bg: #fbfaf6;
        --color-text: #121212;
        --color-heading: #0f0f0f;
        --color-link: #121212;
        --color-muted: #6b7280;
        --color-border: rgba(18, 18, 18, 0.18);
        --color-border-strong: #121212;
        --color-surface: #f1f5f9;
        --color-surface-hover: #e2e8f0;
        --color-surface-strong: #e8edf3;
        --color-navigation: rgba(251, 250, 246, 0.9);
        --color-inverse-surface: #111111;
        --color-inverse-text: #ffffff;
        --color-card-contrast: #ffffff;
        --color-card-contrast-text: #111111;
        --color-callout: #fde68a;
        --color-cta-bg: #111111;
        --color-ticket-bg: #5b21b6;
        --color-ticket-hover: #4c1d95;
        --color-badge-muted: #d1d5db;
        --color-focus: #b45309;
        --color-toggle-hover: rgba(17, 17, 17, 0.08);
        --shadow-soft: 0 18px 42px rgba(15, 23, 42, 0.08);
      }

      html[data-theme="dark"] {
        color-scheme: dark;
        --color-bg: #101315;
        --color-text: #f3efe7;
        --color-heading: #fff7eb;
        --color-link: #fff7eb;
        --color-muted: #b8b0a2;
        --color-border: rgba(255, 247, 235, 0.18);
        --color-border-strong: #f3efe7;
        --color-surface: #1a2024;
        --color-surface-hover: #252d33;
        --color-surface-strong: #171c20;
        --color-navigation: rgba(16, 19, 21, 0.9);
        --color-inverse-surface: #181d21;
        --color-inverse-text: #fffdf8;
        --color-card-contrast: #f3e7cb;
        --color-card-contrast-text: #1a1208;
        --color-callout: #4c3911;
        --color-cta-bg: #a85a18;
        --color-ticket-bg: #6d28d9;
        --color-ticket-hover: #5b21b6;
        --color-badge-muted: #454c55;
        --color-focus: #f7c66b;
        --color-toggle-hover: rgba(255, 247, 235, 0.12);
        --shadow-soft: 0 18px 42px rgba(0, 0, 0, 0.28);
      }

      html {
        background: var(--color-bg);
      }

      body {
        min-height: 100vh;
        background: var(--color-bg);
        color: var(--color-text);
        transition: background-color 0.2s ease, color 0.2s ease;
      }

      ::selection {
        background: var(--color-cta-bg);
        color: var(--color-inverse-text);
      }

      a,
      button {
        transition:
          color 0.2s ease,
          background-color 0.2s ease,
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      a:focus-visible,
      button:focus-visible {
        outline: 2px solid var(--color-focus);
        outline-offset: 3px;
      }

      .bg-navigation {
        background-color: var(--color-navigation) !important;
      }

      nav.bg-navigation {
        border-bottom: 1px solid var(--color-border);
        backdrop-filter: blur(16px);
      }

      footer.bg-navigation {
        border-top: 1px solid var(--color-border);
      }

      .bg-primary,
      .bg-tertiary {
        background-color: var(--color-cta-bg) !important;
      }

      .bg-secondary {
        background-color: var(--color-badge-muted) !important;
      }

      .bg-ticket {
        background-color: var(--color-ticket-bg) !important;
      }

      .border-ticket {
        border-color: var(--color-ticket-bg) !important;
      }

      .hover\:bg-ticket:hover {
        background-color: var(--color-ticket-hover) !important;
      }

      .bg-gray-100 {
        background-color: var(--color-surface) !important;
      }

      .hover\:bg-gray-100:hover {
        background-color: var(--color-surface-hover) !important;
      }

      .bg-yellow-200 {
        background-color: var(--color-callout) !important;
      }

      .bg-black {
        background-color: var(--color-inverse-surface) !important;
        box-shadow: var(--shadow-soft);
      }

      .bg-white {
        background-color: var(--color-card-contrast) !important;
      }

      .text-primary,
      .text-tertiary {
        color: var(--color-heading) !important;
      }

      .text-secondary,
      .text-gray-500 {
        color: var(--color-muted) !important;
      }

      .text-white {
        color: var(--color-inverse-text) !important;
      }

      .text-black {
        color: var(--color-card-contrast-text) !important;
      }

      .border,
      .border-2 {
        border-color: var(--color-border) !important;
      }

      .border-primary {
        border-color: var(--color-border-strong) !important;
      }

      .hr-variant-1,
      .hr-variant-2,
      .hr-variant-3 {
        color: var(--color-border-strong) !important;
        border-color: var(--color-border-strong) !important;
      }

      .mask-text-gray {
        text-shadow: 0 0 var(--color-muted) !important;
      }

      .mask-text-black,
      .hover\:mask-text-black:hover {
        text-shadow: 0 0 var(--color-link) !important;
      }

      .hover\:text-black:hover {
        color: var(--color-link) !important;
      }

      .prose.prose {
        color: var(--color-text);
        --tw-prose-body: var(--color-text);
        --tw-prose-headings: var(--color-heading);
        --tw-prose-lead: var(--color-text);
        --tw-prose-links: var(--color-link);
        --tw-prose-bold: var(--color-heading);
        --tw-prose-counters: var(--color-muted);
        --tw-prose-bullets: var(--color-muted);
        --tw-prose-hr: var(--color-border);
        --tw-prose-quotes: var(--color-text);
        --tw-prose-quote-borders: var(--color-border);
        --tw-prose-captions: var(--color-muted);
        --tw-prose-code: var(--color-heading);
        --tw-prose-pre-code: var(--color-text);
        --tw-prose-pre-bg: var(--color-surface-strong);
        --tw-prose-th-borders: var(--color-border);
        --tw-prose-td-borders: var(--color-border);
      }

      .prose.prose :where(
        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        p,
        li,
        strong,
        em,
        code,
        figcaption,
        td,
        th
      ) {
        color: inherit;
      }

      .prose.prose :where(a) {
        color: var(--color-link);
      }

      .prose.prose :where(blockquote) {
        color: var(--color-text);
        border-inline-start-color: var(--color-border);
      }

      .prose.prose :where(pre) {
        color: var(--color-text);
        background: var(--color-surface-strong);
        box-shadow: inset 0 0 0 1px var(--color-border);
      }

      .theme-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 2.75rem;
        height: 2.75rem;
        border: 1px solid var(--color-border);
        border-radius: 999px;
        background: transparent;
        color: var(--color-text);
      }

      .theme-toggle:hover {
        background: var(--color-toggle-hover);
      }

      .theme-toggle__icon {
        display: none;
        width: 1.25rem;
        height: 1.25rem;
      }

      html[data-theme="light"] .theme-toggle__icon--moon,
      html[data-theme="dark"] .theme-toggle__icon--sun {
        display: inline-flex;
      }

      @media (prefers-reduced-motion: reduce) {
        body,
        a,
        button {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <MainHeader &content="(get props header)" />
    <main
      class="mx-auto my-8 px-4 xl:px-0 w-full max-w-2xl flex flex-col gap-8"
      &children="(render (get props content))"
    ></main>
    <MainFooter />
    <Scripts />
  </body>
</html>
