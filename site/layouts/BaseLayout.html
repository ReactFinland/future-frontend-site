<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (() => {
        const root = document.documentElement;
        const media = window.matchMedia("(prefers-color-scheme: dark)");
        let theme;

        try {
          const storedTheme = window.localStorage.getItem("future-frontend-theme");

          if (storedTheme === "dark" || storedTheme === "light") {
            theme = storedTheme;
          }
        } catch {
          // Ignore storage errors and fall back to the system preference.
        }

        if (!theme) {
          theme = media.matches ? "dark" : "light";
        }

        root.dataset.theme = theme;
        root.style.colorScheme = theme;
      })();
    </script>
    <link rel="stylesheet" href="/theme.css" />
    <script src="/theme.js" defer></script>
    <link rel="icon" href="/images/icon.ico" sizes="any" />
    <link rel="icon" href="/images/icon.svg" type="image/svg+xml" />
    <link
      rel="canonical"
      &href="(urlJoin (get context meta.url) (get context url))"
    />
    <link
      rel="preload"
      href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css"
      integrity="sha384-o/2yZuJZWGJ4s/adjxVW71R+EO/LyCwdQfP5UWSgX/w87iiTXuvDZaejd3TsN7mf"
      crossorigin="anonymous"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <style>
      @view-transition {
        navigation: auto;
      }
    </style>
    <MetaFields />
  </head>
  <body>
    <MainHeader &content="(get props header)" />
    <main
      class="mx-auto my-8 px-4 xl:px-0 w-full max-w-2xl flex flex-col gap-8"
      &children="(render (get props content))"
    ></main>
    <MainFooter />
    <Scripts />
  </body>
</html>
